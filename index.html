<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doze's Roblox UI Libraries</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .library-card { transition: all 0.3s ease; }
    .library-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0, 180, 255, 0.3); }
    .preview-img { height: 180px; object-fit: cover; border-radius: 16px; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <nav class="bg-gradient-to-r from-blue-600 to-cyan-500 py-6 sticky top-0 z-50 shadow-2xl">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <i class="fas fa-cube text-4xl"></i>
        <div>
          <h1 class="text-4xl font-bold tracking-tight">Doze's UI Libraries</h1>
          <p class="text-sm text-blue-100">Roblox UI Preservation Archive</p>
        </div>
      </div>
      <a href="https://github.com/DozeIsOkLol/UILibarys" target="_blank" 
         class="flex items-center gap-3 bg-white/20 hover:bg-white/30 px-6 py-3 rounded-2xl font-semibold transition">
        <i class="fab fa-github text-xl"></i> GitHub Repo
      </a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <input id="search" type="text" placeholder="Search any library..." 
           class="w-full bg-zinc-900 border border-zinc-700 focus:border-blue-500 rounded-3xl px-8 py-5 text-lg outline-none mb-12">

    <!-- MadeByDoze Section -->
    <section class="mb-16">
      <h2 class="text-3xl font-bold mb-6 flex items-center gap-3"><span class="text-yellow-400">★</span> MadeByDoze</h2>
      <div id="madebydoze-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <!-- UILibrarys Section -->
    <section class="mb-16">
      <h2 class="text-3xl font-bold mb-6 flex items-center gap-3"><span class="text-blue-400">📚</span> UILibrarys</h2>
      <div id="uilibrarys-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <!-- Notifications -->
    <section class="mb-16">
      <h2 class="text-3xl font-bold mb-6 flex items-center gap-3"><span class="text-purple-400">🛎️</span> Notifications</h2>
      <div id="notifications-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <!-- Utilities -->
    <section>
      <h2 class="text-3xl font-bold mb-6 flex items-center gap-3"><span class="text-green-400">🛠️</span> Utilities</h2>
      <div id="utilities-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>
  </div>

  <footer class="bg-black py-10 text-center text-zinc-500 border-t border-zinc-800">
    <p>Made with ❤️ by DozeIsOkLol • For the Roblox community</p>
  </footer>

  <script>
    const OWNER = "DozeIsOkLol";
    const REPO = "UILibarys";

    const sections = [
      { id: "madebydoze-grid", path: "MadeByDoze" },
      { id: "uilibrarys-grid", path: "UILibrarys" },
      { id: "notifications-grid", path: "Notifications" },
      { id: "utilities-grid", path: "Utilities" }
    ];

    async function loadSection(section) {
      const grid = document.getElementById(section.id);
      grid.innerHTML = `<p class="col-span-full text-center text-zinc-400 py-8">Loading ${section.path}...</p>`;

      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${section.path}`);
        if (!res.ok) throw new Error("Failed");
        const items = await res.json();

        const folders = items.filter(item => item.type === "dir");

        grid.innerHTML = "";

        for (const folder of folders) {
          const name = folder.name;
          const baseUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${section.path}/${name}`;

          const loadstring = `loadstring(game:HttpGet("${baseUrl}/Source.lua"))()`;
          
          // Try to get Example.lua for copy example
          let exampleCode = `print("No Example.lua found for ${name}")`;
          try {
            const exRes = await fetch(`${baseUrl}/Example.lua`);
            if (exRes.ok) {
              exampleCode = await exRes.text();
            }
          } catch(e) {}

          const card = document.createElement("div");
          card.className = "library-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden group";

          card.innerHTML = `
            <div class="relative">
              <img src="${baseUrl}/image.png" onerror="this.style.display='none'" 
                   class="preview-img w-full bg-zinc-800" alt="${name} Preview">
              <div class="absolute top-3 right-3 bg-black/70 text-xs px-3 py-1 rounded-full">
                ${section.path}
              </div>
            </div>
            
            <div class="p-6">
              <h3 class="text-2xl font-bold mb-4">${name}</h3>
              
              <div class="flex flex-col gap-3">
                <button onclick="copyToClipboard('${loadstring}', this)" 
                        class="bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-semibold flex items-center justify-center gap-2 transition">
                  <i class="fas fa-copy"></i> Copy Loadstring
                </button>
                
                <button onclick="copyExample('${btoa(exampleCode)}', this)" 
                        class="bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-semibold flex items-center justify-center gap-2 transition">
                  <i class="fas fa-file-code"></i> Copy Example Script
                </button>
              </div>

              <a href="${folder.html_url}" target="_blank" 
                 class="block text-center mt-4 text-zinc-400 hover:text-white text-sm flex items-center justify-center gap-2">
                <i class="fab fa-github"></i> Open Folder on GitHub
              </a>
            </div>
          `;

          grid.appendChild(card);
        }
      } catch (err) {
        grid.innerHTML = `<p class="col-span-full text-red-400 text-center py-8">Failed to load ${section.path}</p>`;
      }
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text);
      const original = btn.innerHTML;
      btn.innerHTML = `<i class="fas fa-check"></i> Copied!`;
      setTimeout(() => btn.innerHTML = original, 2000);
    }

    function copyExample(encoded, btn) {
      const text = atob(encoded);
      navigator.clipboard.writeText(text);
      const original = btn.innerHTML;
      btn.innerHTML = `<i class="fas fa-check"></i> Copied Example!`;
      setTimeout(() => btn.innerHTML = original, 2000);
    }

    // Search across all cards
    document.getElementById("search").addEventListener("input", (e) => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.library-card').forEach(card => {
        const title = card.querySelector('h3').textContent.toLowerCase();
        card.style.display = title.includes(term) ? '' : 'none';
      });
    });

    // Load all sections
    window.onload = () => {
      sections.forEach(section => loadSection(section));
    };
  </script>
</body>
</html>
