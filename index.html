<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DozeIsOkLol • Roblox UI Libraries</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-6px); box-shadow: 0 25px 50px -12px rgb(0 240 255 / 0.15); }

        .modal { animation: modalPop 0.3s ease forwards; }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .code-container { max-height: 75vh; overflow-y: auto; }
        pre { background: #0f0f0f !important; padding: 1.5rem; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white">

    <header class="border-b border-white/10 bg-black/80 backdrop-blur-lg sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-6 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <div class="w-10 h-10 bg-[#00f0ff] rounded-2xl flex items-center justify-center text-black font-bold text-2xl">D</div>
                <div>
                    <h1 class="title-font text-3xl tracking-tighter">UILIBRARIES</h1>
                    <p class="text-xs text-white/50 -mt-1">by DozeIsOkLol</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-8">
                <a href="https://github.com/DozeIsOkLol/UILibarys" target="_blank" class="flex items-center gap-x-2 text-white/70 hover:text-white">
                    <i class="fa-brands fa-github text-xl"></i>
                    <span class="font-medium">GitHub Repo</span>
                </a>
                
                <div class="relative w-80">
                    <input id="searchInput" type="text" placeholder="Search libraries..." 
                           class="w-full bg-white/5 border border-white/10 focus:border-[#00f0ff] rounded-3xl px-6 py-4 text-sm outline-none placeholder:text-white/40">
                    <i class="fa-solid fa-magnifying-glass absolute right-6 top-1/2 -translate-y-1/2 text-white/40"></i>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-screen-2xl mx-auto px-8 py-12">
        <div class="mb-12">
            <h2 class="text-5xl title-font tracking-tighter mb-2">Roblox UI Libraries</h2>
            <p class="text-white/60">Some libraries have multiple versions/subfolders. Click Source or Example to choose the folder.</p>
        </div>

        <div id="libraryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-8">
            <!-- Populated by JS -->
        </div>
    </main>

    <!-- Folder Selector Modal -->
    <div id="folderModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[110] p-6">
        <div class="modal bg-[#111] border border-white/10 rounded-3xl w-full max-w-md">
            <div class="p-6 border-b border-white/10">
                <h3 class="text-xl font-semibold title-font" id="folderLibName"></h3>
                <p class="text-white/60 text-sm mt-1">Choose a subfolder / version</p>
            </div>
            <div class="p-6" id="folderList"></div>
            <div class="p-6 border-t border-white/10 flex justify-end">
                <button onclick="closeFolderModal()" class="px-6 py-3 text-white/70 hover:text-white">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Script Viewer Modal -->
    <div id="scriptModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-6">
        <div class="modal bg-[#111] border border-white/10 rounded-3xl w-full max-w-4xl max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between p-6 border-b border-white/10">
                <div>
                    <span id="scriptTitle" class="text-2xl font-semibold title-font"></span>
                    <span id="scriptPath" class="ml-3 text-sm text-white/50"></span>
                </div>
                <button onclick="closeScriptModal()" class="text-white/60 hover:text-white text-3xl leading-none">×</button>
            </div>
            
            <div class="flex-1 p-6 overflow-hidden flex flex-col">
                <div class="flex justify-between mb-4 items-center">
                    <div id="scriptType" class="text-sm uppercase tracking-widest text-[#00f0ff]"></div>
                    <button onclick="copyScriptCode()" 
                            class="flex items-center gap-x-2 bg-white/10 hover:bg-white/20 px-5 py-2 rounded-2xl text-sm font-medium transition-colors">
                        <i class="fa-solid fa-copy"></i> Copy Code
                    </button>
                </div>
                
                <div class="code-container flex-1 bg-black rounded-2xl overflow-hidden">
                    <pre><code id="scriptCode" class="language-lua"></code></pre>
                </div>
            </div>
        </div>
    </div>

    <footer class="border-t border-white/10 bg-black/80 py-8 text-center text-white/40 text-sm">
        Supports nested folders & multiple versions • Choose when needed
    </footer>

    <script>
        const libraries = [
            { name: "!ExtraUIs", possibleSubs: [] },
            { name: "0x37", possibleSubs: [] },
            { name: "Abyss Lib", possibleSubs: [] },
            { name: "AkiriLib", possibleSubs: [] },
            { name: "AppleLib", possibleSubs: [] },
            { name: "AquaLIB", possibleSubs: [] },
            { name: "AriesLib", possibleSubs: [] },
            { name: "AtlasLib", possibleSubs: [] },
            { name: "AtlasLib2", possibleSubs: [] },
            { name: "AzureLib", possibleSubs: [] },
            { name: "BaconLib", possibleSubs: [] },
            { name: "BitchBotLib", possibleSubs: [] },
            { name: "BlekLib", possibleSubs: [] },
            { name: "BracketLib", possibleSubs: [] },
            { name: "CFAHubLib", possibleSubs: [] },
            { name: "CenterLib", possibleSubs: [] },
            { name: "CerberusLib", possibleSubs: [] },
            { name: "CoastingLib", possibleSubs: [] },
            { name: "CoastingLib2", possibleSubs: [] },
            { name: "CriminalityLib", possibleSubs: [] },
            { name: "DainoLib", possibleSubs: [] },
            { name: "DeadcellRemakeLib", possibleSubs: [] },
            { name: "DiscordLib", possibleSubs: [] },
            { name: "DollarWare", possibleSubs: [] },
            { name: "DrawingUILib", possibleSubs: [] },
            { name: "EdgeLib", possibleSubs: [] },
            { name: "ElasticLib", possibleSubs: [] },
            { name: "Elerium", possibleSubs: [] },
            { name: "EngoLib", possibleSubs: [] },
            { name: "ExecutionerLib", possibleSubs: [] },
            { name: "ExodusLib", possibleSubs: [] },
            { name: "FatalityLib", possibleSubs: [] },
            { name: "FinityLib", possibleSubs: [] },
            { name: "FluxLib", possibleSubs: [] },
            { name: "FriseXLib", possibleSubs: [] },
            { name: "FrostyLib", possibleSubs: [] },
            { name: "FuzkiLib", possibleSubs: [] },
            { name: "GameSneezeLib", possibleSubs: [] },
            { name: "GeradLib", possibleSubs: [] },
            { name: "HattoriV4Lib", possibleSubs: [] },
            { name: "HydraLib", possibleSubs: [] },
            { name: "ImpactLib", possibleSubs: [] },
            { name: "Informant.wtfLib", possibleSubs: [] },
            { name: "IreXionLib", possibleSubs: [] },
            { name: "IsotopiaLib", possibleSubs: [] },
            { name: "JanLib", possibleSubs: [] },
            { name: "KavoLib", possibleSubs: [] },
            { name: "KinxLib", possibleSubs: [] },
            { name: "KronosLib", possibleSubs: [] },
            { name: "LigmaLib", possibleSubs: [] },
            { name: "LinoriaLib", possibleSubs: ["Main"] },
            { name: "LuminosityLib", possibleSubs: [] },
            { name: "LuxwareLib", possibleSubs: [] },
            { name: "M7Lib", possibleSubs: [] },
            { name: "MangoLib", possibleSubs: [] },
            { name: "MaterialLib", possibleSubs: [] },
            { name: "MercuryLib", possibleSubs: [] },
            { name: "OxBloodLib", possibleSubs: ["v0.0.1", "v0.0.2"," v0.0.3"] },
            { name: "TwinkLib", possibleSubs: [] },
            { name: "TwinkLibV2", possibleSubs: ["v0.0.1", "v0.0.2"," v0.0.3" ,"v0.0.4"] },
            { name: "WetLib", possibleSubs: [] },
            { name: "WindowsXPLib", possibleSubs: ["v0.0.1", "v0.0.2"," v0.0.3" ,"v0.0.4"] },
            { name: "XanLib", possibleSubs: [] }
        ];

        let currentLib = null;
        let currentType = null;
        let currentCode = '';

        const commonSubs = ["Main", "Source", "v1", "v2", "v0.1", "v0.2", "Latest"];

        async function fileExists(url) {
            try {
                const res = await fetch(url, { method: 'HEAD' });
                return res.ok;
            } catch { return false; }
        }

        async function getPreviewUrl(lib) {
            const encoded = encodeURIComponent(lib.name);
            const base = `https://raw.githubusercontent.com/DozeIsOkLol/UILibarys/main/UILibrarys/${encoded}/`;
            const attempts = [`Preview.png`, `Preview1.png`, `image.png`];

            const subsToTry = [...(lib.possibleSubs || []), ...commonSubs, ""];

            for (let sub of subsToTry) {
                for (let file of attempts) {
                    const url = sub ? `${base}${sub}/${file}` : `${base}${file}`;
                    if (await fileExists(url)) return url;
                }
            }
            return null;
        }

        function renderLibraries(filteredLibs) {
            const grid = document.getElementById('libraryGrid');
            grid.innerHTML = '';

            filteredLibs.forEach(lib => {
                const safeId = lib.name.replace(/[^a-zA-Z0-9]/g, '');
                const card = document.createElement('div');
                card.className = `card bg-[#111] border border-white/10 rounded-3xl overflow-hidden`;
                card.innerHTML = `
                    <div class="relative h-56 bg-black flex items-center justify-center overflow-hidden" id="preview-${safeId}">
                        <div class="text-center">
                            <i class="fa-solid fa-image text-6xl text-white/20 mb-4"></i>
                            <p class="text-white/40 text-sm">Loading preview...</p>
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-2xl font-semibold title-font tracking-tight mb-1">${lib.name}</h3>
                        ${lib.possibleSubs && lib.possibleSubs.length > 0 ? 
                            `<p class="text-xs text-[#00f0ff]">Multiple versions available</p>` : ''}
                        <div class="grid grid-cols-2 gap-3 mt-6">
                            <button onclick="openScript('${lib.name}', 'source')" 
                                    class="bg-white/10 hover:bg-white/20 py-4 rounded-2xl font-medium flex items-center justify-center gap-2">
                                <i class="fa-solid fa-code"></i> Source
                            </button>
                            <button onclick="openScript('${lib.name}', 'example')" 
                                    class="bg-[#00f0ff] hover:bg-[#00d4e0] text-black py-4 rounded-2xl font-semibold flex items-center justify-center gap-2">
                                <i class="fa-solid fa-play"></i> Example
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);

                getPreviewUrl(lib).then(url => {
                    const container = document.getElementById(`preview-${safeId}`);
                    if (url) {
                        container.innerHTML = `<img src="${url}" class="w-full h-full object-cover transition-transform hover:scale-110" alt="${lib.name}">`;
                    } else {
                        container.innerHTML = `
                            <div class="text-center p-8">
                                <i class="fa-solid fa-image-slash text-5xl text-white/30 mb-3"></i>
                                <p class="text-white/40 text-sm font-medium">No Preview Available</p>
                            </div>
                        `;
                    }
                });
            });
        }

        async function openScript(libName, type) {
            currentLib = libraries.find(l => l.name === libName);
            currentType = type;
            if (!currentLib) return;

            const encoded = encodeURIComponent(libName);
            const base = `https://raw.githubusercontent.com/DozeIsOkLol/UILibarys/main/UILibrarys/${encoded}/`;
            const fileName = type === 'source' ? 'Source.lua' : 'Example.lua';

            let foundFolders = [];

            // Root
            if (await fileExists(`${base}${fileName}`)) {
                foundFolders.push({ name: "Root (main folder)", path: "" });
            }

            // Known possibleSubs
            for (let sub of (currentLib.possibleSubs || [])) {
                if (await fileExists(`${base}${sub}/${fileName}`)) {
                    foundFolders.push({ name: sub, path: sub });
                }
            }

            // Common guesses
            for (let sub of commonSubs) {
                if (!foundFolders.some(f => f.path === sub) && await fileExists(`${base}${sub}/${fileName}`)) {
                    foundFolders.push({ name: sub, path: sub });
                }
            }

            if (foundFolders.length === 0) {
                showScriptContent(libName, "", `-- ${fileName} not found in any folder for ${libName}`);
                return;
            }

            if (foundFolders.length === 1) {
                loadAndShowScript(foundFolders[0].path);
            } else {
                showFolderSelector(foundFolders);
            }
        }

        function showFolderSelector(folders) {
            const modal = document.getElementById('folderModal');
            const list = document.getElementById('folderList');
            const title = document.getElementById('folderLibName');

            title.textContent = currentLib.name;
            list.innerHTML = '';

            folders.forEach(folder => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left px-6 py-4 hover:bg-white/10 rounded-2xl transition-colors mb-2 flex justify-between items-center";
                btn.innerHTML = `<span>${folder.name}</span><i class="fa-solid fa-chevron-right text-white/40"></i>`;
                btn.onclick = () => {
                    closeFolderModal();
                    loadAndShowScript(folder.path);
                };
                list.appendChild(btn);
            });

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeFolderModal() {
            const modal = document.getElementById('folderModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function loadAndShowScript(subPath) {
            const encoded = encodeURIComponent(currentLib.name);
            const base = `https://raw.githubusercontent.com/DozeIsOkLol/UILibarys/main/UILibrarys/${encoded}/`;
            const fileName = currentType === 'source' ? 'Source.lua' : 'Example.lua';
            const fullUrl = subPath ? `${base}${subPath}/${fileName}` : `${base}${fileName}`;

            try {
                const res = await fetch(fullUrl);
                currentCode = res.ok ? await res.text() : `-- ${fileName} not found in the selected folder.`;
            } catch {
                currentCode = `-- Failed to load ${fileName}`;
            }

            showScriptContent(currentLib.name, subPath || "Root", currentCode);
        }

        function showScriptContent(libName, subPath, code) {
            const modal = document.getElementById('scriptModal');
            document.getElementById('scriptTitle').textContent = libName;
            document.getElementById('scriptPath').textContent = subPath ? `(${subPath})` : '';
            document.getElementById('scriptType').textContent = (currentType === 'source' ? 'SOURCE' : 'EXAMPLE') + '.LUA';
            document.getElementById('scriptCode').textContent = code;

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            setTimeout(() => hljs.highlightElement(document.getElementById('scriptCode')), 100);
        }

        function closeScriptModal() {
            const modal = document.getElementById('scriptModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function copyScriptCode() {
            if (!currentCode) return;
            navigator.clipboard.writeText(currentCode).then(() => {
                const btn = event.currentTarget;
                const orig = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-check"></i> Copied!`;
                setTimeout(() => btn.innerHTML = orig, 2000);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            const filtered = libraries.filter(lib => lib.name.toLowerCase().includes(term));
            renderLibraries(filtered);
        });

        document.getElementById('folderModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('folderModal')) closeFolderModal();
        });
        document.getElementById('scriptModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('scriptModal')) closeScriptModal();
        });

        window.onload = () => {
            renderLibraries(libraries);
        };
    </script>
</body>
</html>
