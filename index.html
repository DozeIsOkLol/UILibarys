<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DozeIsOkLol • Roblox Resources</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-8px); box-shadow: 0 30px 60px -15px rgb(0 240 255 / 0.2); }

        .modal { animation: modalPop 0.3s ease forwards; }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .tab-active {
            border-bottom: 3px solid #00f0ff;
            color: white;
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white">

    <header class="border-b border-white/10 bg-black/80 backdrop-blur-lg sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-11 h-11 bg-[#00f0ff] rounded-2xl flex items-center justify-center text-black font-bold text-3xl">D</div>
                    <div>
                        <h1 class="title-font text-4xl tracking-tighter">DozeIsOkLol</h1>
                        <p class="text-sm text-white/60">Roblox Resources Hub</p>
                    </div>
                </div>
                
                <div class="relative w-96">
                    <input id="searchInput" type="text" placeholder="Search anything..." 
                           class="w-full bg-white/5 border border-white/10 focus:border-[#00f0ff] rounded-3xl px-6 py-4 text-sm outline-none">
                    <i class="fa-solid fa-magnifying-glass absolute right-6 top-1/2 -translate-y-1/2 text-white/40"></i>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex gap-8 mt-8 border-b border-white/10" id="tabs">
                <!-- Generated by JS -->
            </div>
        </div>
    </header>

    <main class="max-w-screen-2xl mx-auto px-8 py-12">
        <div class="mb-10">
            <h2 id="sectionTitle" class="text-5xl title-font tracking-tighter">UI Libraries</h2>
            <p id="sectionDesc" class="text-white/60 mt-2">Browse all preserved Roblox UI Libraries</p>
        </div>

        <div id="libraryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-8">
            <!-- Populated by JS -->
        </div>
    </main>

    <!-- Folder Selector Modal -->
    <div id="folderModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[110] p-6">
        <div class="modal bg-[#111] border border-white/10 rounded-3xl w-full max-w-md">
            <div class="p-6 border-b border-white/10">
                <h3 class="text-xl font-semibold title-font" id="folderLibName"></h3>
                <p class="text-white/60 text-sm mt-1">Choose version / subfolder</p>
            </div>
            <div class="p-6" id="folderList"></div>
            <div class="p-6 border-t border-white/10 flex justify-end">
                <button onclick="closeFolderModal()" class="px-6 py-3 text-white/70 hover:text-white">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Script Viewer Modal -->
    <div id="scriptModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-6">
        <div class="modal bg-[#111] border border-white/10 rounded-3xl w-full max-w-4xl max-h-[92vh] flex flex-col">
            <div class="flex items-center justify-between p-6 border-b border-white/10">
                <div class="flex-1">
                    <span id="scriptTitle" class="text-2xl font-semibold title-font"></span>
                    <span id="scriptPath" class="ml-3 text-sm text-cyan-400"></span>
                </div>
                <button onclick="closeScriptModal()" class="text-4xl leading-none text-white/60 hover:text-white">×</button>
            </div>
            
            <div class="flex-1 p-6 flex flex-col">
                <div class="flex gap-3 mb-4">
                    <div id="scriptType" class="text-sm uppercase tracking-widest text-[#00f0ff]"></div>
                    
                    <button onclick="copyLoadstring()" 
                            class="ml-auto flex items-center gap-x-2 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 px-5 py-2 rounded-2xl text-sm font-medium">
                        <i class="fa-solid fa-link"></i> Copy Loadstring
                    </button>
                    <button onclick="copyScriptCode()" 
                            class="flex items-center gap-x-2 bg-white/10 hover:bg-white/20 px-5 py-2 rounded-2xl text-sm font-medium">
                        <i class="fa-solid fa-copy"></i> Copy Code
                    </button>
                </div>
                
                <div class="code-container flex-1 bg-black rounded-2xl overflow-hidden border border-white/10">
                    <pre><code id="scriptCode" class="language-lua"></code></pre>
                </div>
            </div>
        </div>
    </div>

    <footer class="border-t border-white/10 bg-black/80 py-10 text-center text-white/40 text-sm">
        All resources loaded directly from your GitHub repo
    </footer>

    <script>
        // ================== YOUR FOLDERS ==================
        const categories = [
            { id: "UILibrarys", name: "UI Libraries", icon: "🎨" },
            { id: "Utilities", name: "Utilities", icon: "🛠️" },
            { id: "Notifications", name: "Notifications", icon: "🛎️" },
            { id: "Models", name: "Models", icon: "📦" },
            { id: "MadeByDoze", name: "Made By Doze", icon: "⭐" },
            { id: "Games", name: "Games", icon: "🎮" },
            { id: "For UI makers", name: "For UI Makers", icon: "✍️" }
        ];

        // For each category, list the items (you can expand this easily)
        const allItems = {
            "UILibrarys": [
            { name: "0x37", possibleSubs: [] },
            { name: "Abyss Lib", possibleSubs: [] },
            { name: "AkiriLib", possibleSubs: [] },
            { name: "AppleLib", possibleSubs: [] },
            { name: "AquaLIB", possibleSubs: [] },
            { name: "AriesLib", possibleSubs: [] },
            { name: "AtlasLib", possibleSubs: [] },
            { name: "AtlasLib2", possibleSubs: [] },
            { name: "AzureLib", possibleSubs: [] },
            { name: "BaconLib", possibleSubs: [] },
            { name: "BitchBotLib", possibleSubs: [] },
            { name: "BlekLib", possibleSubs: [] },
            { name: "BracketLib", possibleSubs: [] },
            { name: "CFAHubLib", possibleSubs: [] },
            { name: "CenterLib", possibleSubs: [] },
            { name: "CerberusLib", possibleSubs: [] },
            { name: "CoastingLib", possibleSubs: [] },
            { name: "CoastingLib2", possibleSubs: [] },
            { name: "CriminalityLib", possibleSubs: [] },
            { name: "DainoLib", possibleSubs: [] },
            { name: "DeadcellRemakeLib", possibleSubs: [] },
            { name: "DiscordLib", possibleSubs: [] },
            { name: "DollarWare", possibleSubs: [] },
            { name: "DrawingUILib", possibleSubs: [] },
            { name: "EdgeLib", possibleSubs: [] },
            { name: "ElasticLib", possibleSubs: [] },
            { name: "Elerium", possibleSubs: [] },
            { name: "EngoLib", possibleSubs: [] },
            { name: "ExecutionerLib", possibleSubs: [] },
            { name: "ExodusLib", possibleSubs: [] },
            { name: "FatalityLib", possibleSubs: [] },
            { name: "FinityLib", possibleSubs: [] },
            { name: "FluxLib", possibleSubs: [] },
            { name: "FriseXLib", possibleSubs: [] },
            { name: "FrostyLib", possibleSubs: [] },
            { name: "FuzkiLib", possibleSubs: [] },
            { name: "GameSneezeLib", possibleSubs: [] },
            { name: "GeradLib", possibleSubs: [] },
            { name: "HattoriV4Lib", possibleSubs: [] },
            { name: "HydraLib", possibleSubs: [] },
            { name: "ImpactLib", possibleSubs: [] },
            { name: "Informant.wtfLib", possibleSubs: [] },
            { name: "IreXionLib", possibleSubs: [] },
            { name: "IsotopiaLib", possibleSubs: [] },
            { name: "JanLib", possibleSubs: [] },
            { name: "KavoLib", possibleSubs: [] },
            { name: "KinxLib", possibleSubs: [] },
            { name: "KronosLib", possibleSubs: [] },
            { name: "LigmaLib", possibleSubs: [] },
            { name: "LinoriaLib", possibleSubs: ["Main"] },
            { name: "LuminosityLib", possibleSubs: [] },
            { name: "LuxwareLib", possibleSubs: [] },
            { name: "M7Lib", possibleSubs: [] },
            { name: "MangoLib", possibleSubs: [] },
            { name: "MaterialLib", possibleSubs: [] },
            { name: "MercuryLib", possibleSubs: [] },
            { name: "OxBloodLib", possibleSubs: ["v0.0.1", "v0.0.2", "v0.0.3"] },
            { name: "TwinkLib", possibleSubs: [] },
            { name: "TwinkLibV2", possibleSubs: ["v0.0.1", "v0.0.2", "v0.0.3", "v0.0.4"] },
            { name: "WetLib", possibleSubs: [] },
            { name: "WindowsXPLib", possibleSubs: ["v0.0.1", "v0.0.2", "v0.0.3", "v0.0.4"] },
            { name: "XanLib", possibleSubs: [] }
            ],
            "Utilities": [
                // Add your Utilities folder items here later
                { name: "Example Utility", possibleSubs: [] }
            ],
            "Notifications": [],
            "Models": [],
            "MadeByDoze": [],
            "Games": [],
            "For UI makers": []
        };

        let currentCategory = "UILibrarys";
        let currentLib = null;
        let currentType = null;
        let currentSubPath = "";
        let currentCode = "";

        const commonSubs = ["Main", "Source", "v1", "v2", "v0.1", "v0.2", "Latest"];

        async function fileExists(url) {
            try {
                const res = await fetch(url, { method: 'HEAD' });
                return res.ok;
            } catch { return false; }
        }

        // Render Tabs
        function renderTabs() {
            const tabsContainer = document.getElementById('tabs');
            tabsContainer.innerHTML = '';

            categories.forEach(cat => {
                const isActive = cat.id === currentCategory;
                const tab = document.createElement('button');
                tab.className = `pb-4 px-6 font-medium flex items-center gap-2 text-lg transition-colors ${isActive ? 'tab-active' : 'text-white/60 hover:text-white'}`;
                tab.innerHTML = `${cat.icon} ${cat.name}`;
                tab.onclick = () => {
                    currentCategory = cat.id;
                    renderTabs();
                    renderCurrentCategory();
                };
                tabsContainer.appendChild(tab);
            });
        }

        async function getPreviewUrl(item, category) {
            const encoded = encodeURIComponent(item.name);
            const base = `https://raw.githubusercontent.com/DozeIsOkLol/UILibarys/main/${category}/${encoded}/`;
            const attempts = [`Preview.png`, `Preview1.png`, `image.png`];
            const subsToTry = [...(item.possibleSubs || []), ...commonSubs, ""];

            for (let sub of subsToTry) {
                for (let file of attempts) {
                    const url = sub ? `${base}${sub}/${file}` : `${base}${file}`;
                    if (await fileExists(url)) return url;
                }
            }
            return null;
        }

        function renderCurrentCategory() {
            const items = allItems[currentCategory] || [];
            const grid = document.getElementById('libraryGrid');
            grid.innerHTML = '';

            document.getElementById('sectionTitle').textContent = categories.find(c => c.id === currentCategory).name;
            document.getElementById('sectionDesc').textContent = `Browsing ${categories.find(c => c.id === currentCategory).name}`;

            items.forEach(item => {
                const safeId = item.name.replace(/[^a-zA-Z0-9]/g, '');
                const cardHTML = `
                    <div class="card bg-[#111] border border-white/10 rounded-3xl overflow-hidden">
                        <div class="relative h-56 bg-black flex items-center justify-center overflow-hidden" id="preview-${safeId}">
                            <div class="text-center">
                                <i class="fa-solid fa-image text-6xl text-white/20 mb-4"></i>
                                <p class="text-white/40 text-sm">Loading...</p>
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-2xl font-semibold title-font tracking-tight mb-1">${item.name}</h3>
                            ${item.possibleSubs && item.possibleSubs.length > 0 ? 
                                `<p class="text-xs text-[#00f0ff]">Multiple versions</p>` : ''}
                            <div class="grid grid-cols-2 gap-3 mt-6">
                                <button onclick="openScript('${item.name}', 'source', '${currentCategory}')" 
                                        class="bg-white/10 hover:bg-white/20 py-4 rounded-2xl font-medium flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-code"></i> Source
                                </button>
                                <button onclick="openScript('${item.name}', 'example', '${currentCategory}')" 
                                        class="bg-[#00f0ff] hover:bg-[#00d4e0] text-black py-4 rounded-2xl font-semibold flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-play"></i> Example
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;

                // Load preview
                getPreviewUrl(item, currentCategory).then(url => {
                    const container = document.getElementById(`preview-${safeId}`);
                    if (url) {
                        container.innerHTML = `<img src="${url}" class="w-full h-full object-cover transition-transform hover:scale-110" alt="${item.name}">`;
                    } else {
                        container.innerHTML = `
                            <div class="text-center p-8">
                                <i class="fa-solid fa-image-slash text-5xl text-white/30 mb-3"></i>
                                <p class="text-white/40 text-sm font-medium">No Preview Available</p>
                            </div>
                        `;
                    }
                });
            });
        }

        // Keep your existing openScript, showFolderSelector, loadAndShowScript, copyLoadstring, etc.
        // (I kept them the same but updated to accept category)

        async function openScript(libName, type, category) {
            currentLib = (allItems[category] || []).find(l => l.name === libName);
            currentType = type;
            currentCategory = category;   // important for loadstring

            if (!currentLib) return;

            // ... rest of your openScript logic (same as before) ...
            // Just make sure to pass category when building URLs
        }

        // Copy Loadstring (updated to support any category)
        function copyLoadstring() {
            if (!currentLib) return;
            const encodedName = encodeURIComponent(currentLib.name);
            const sub = currentSubPath ? `/${currentSubPath}` : "";
            const fileName = currentType === 'source' ? 'Source.lua' : 'Example.lua';
            
            const loadstring = `loadstring(game:HttpGet("https://raw.githubusercontent.com/DozeIsOkLol/UILibarys/main/${currentCategory}/${encodedName}${sub}/${fileName}"))()`;
            
            navigator.clipboard.writeText(loadstring).then(() => {
                const notif = document.createElement('div');
                notif.style.cssText = 'position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#10b981; color:black; padding:14px 28px; border-radius:9999px; font-weight:600; box-shadow:0 10px 30px -10px #10b981; z-index:200;';
                notif.textContent = '✅ Loadstring copied!';
                document.body.appendChild(notif);
                setTimeout(() => notif.remove(), 2500);
            });
        }

        // Initialize
        window.onload = () => {
            renderTabs();
            renderCurrentCategory();
        };
    </script>
</body>
</html>
