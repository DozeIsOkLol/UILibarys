<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doze's Roblox UI Libraries</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .library-card { transition: all 0.3s; }
    .library-card:hover { transform: translateY(-8px); box-shadow: 0 0 25px rgba(59, 130, 246, 0.5); }
    .roblox-blue { background: linear-gradient(135deg, #00b4ff, #0066ff); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- Navbar -->
  <nav class="roblox-blue py-5 sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fas fa-cube text-3xl"></i>
        <h1 class="text-3xl font-bold">Doze's UI Libraries</h1>
      </div>
      <a href="https://github.com/DozeIsOkLol/UILibarys" target="_blank" 
         class="bg-white/20 hover:bg-white/30 px-6 py-2 rounded-xl flex items-center gap-2 font-medium transition">
        <i class="fab fa-github"></i> View Repo
      </a>
    </div>
  </nav>

  <!-- Hero -->
  <header class="max-w-7xl mx-auto px-6 py-20 text-center">
    <h2 class="text-6xl font-bold mb-4">Roblox UI Libraries Archive</h2>
    <p class="text-2xl text-zinc-400 mb-8">65+ preserved UI libraries • MadeByDoze originals • Notifications & more</p>
    <div class="flex justify-center gap-4">
      <a href="#libraries" class="bg-white text-zinc-900 px-8 py-4 rounded-2xl font-bold text-lg hover:scale-105 transition">Browse All Libraries</a>
      <a href="https://github.com/DozeIsOkLol/UILibarys" target="_blank" class="border border-white/50 px-8 py-4 rounded-2xl font-medium hover:bg-white/10 transition">GitHub Repo</a>
    </div>
  </header>

  <!-- Libraries Section -->
  <section id="libraries" class="max-w-7xl mx-auto px-6 pb-20">
    <div class="flex items-center justify-between mb-8">
      <h3 class="text-4xl font-bold">All UI Libraries</h3>
      <input id="search" type="text" placeholder="Search libraries..." 
             class="bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-3 w-80 focus:outline-none focus:border-blue-500">
    </div>

    <div id="library-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <!-- Populated by JavaScript -->
    </div>
  </section>

  <footer class="bg-black py-12 text-center text-zinc-500">
    <p>Made with ❤️ by Doze (DozeIsOkLol) • Preservation Archive</p>
    <p class="text-sm mt-2">Always credit original creators • Discord: vampxity</p>
  </footer>

  <script>
    const OWNER = "DozeIsOkLol";
    const REPO = "UILibarys";
    const PATH = "UILibrarys";

    async function loadLibraries() {
      const grid = document.getElementById("library-grid");
      grid.innerHTML = `<div class="col-span-full text-center py-12 text-zinc-400">Loading libraries from GitHub...</div>`;

      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`);
        const data = await res.json();

        const libraries = data.filter(item => item.type === "dir");

        grid.innerHTML = "";

        libraries.forEach(lib => {
          const name = lib.name;
          const loadstring = `loadstring(game:HttpGet("https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${PATH}/${name}/Source.lua"))()`;

          const card = document.createElement("div");
          card.className = "library-card bg-zinc-900 border border-zinc-800 rounded-3xl p-6 hover:border-blue-500 cursor-pointer";
          card.innerHTML = `
            <div class="flex items-start gap-4">
              <div class="flex-1">
                <h4 class="text-2xl font-bold mb-1">${name}</h4>
                <p class="text-emerald-400 text-sm font-medium">Ready to load</p>
              </div>
              <i class="fas fa-cube text-5xl text-blue-500 opacity-20"></i>
            </div>
            
            <button onclick="copyLoadstring('${loadstring}'); event.stopImmediatePropagation();" 
                    class="mt-6 w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl text-sm font-bold flex items-center justify-center gap-2">
              <i class="fas fa-copy"></i> COPY LOADSTRING
            </button>

            <div class="mt-4 flex gap-3 text-xs">
              <a href="${lib.html_url}" target="_blank" 
                 class="flex-1 text-center py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center justify-center gap-2">
                <i class="fab fa-github"></i> GitHub
              </a>
              <a href="https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${PATH}/${name}/image.png" target="_blank" 
                 class="flex-1 text-center py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-blue-400">
                View Preview
              </a>
            </div>
          `;
          
          // Click whole card to open GitHub folder
          card.addEventListener("click", () => window.open(lib.html_url, "_blank"));
          
          grid.appendChild(card);
        });

        // Search functionality
        document.getElementById("search").addEventListener("input", (e) => {
          const term = e.target.value.toLowerCase();
          Array.from(grid.children).forEach(card => {
            const title = card.querySelector("h4").textContent.toLowerCase();
            card.style.display = title.includes(term) ? "" : "none";
          });
        });

      } catch (err) {
        grid.innerHTML = `<div class="col-span-full text-red-400 text-center">Failed to load. Check your internet or GitHub rate limit.</div>`;
      }
    }

    window.copyLoadstring = function(text) {
      navigator.clipboard.writeText(text).then(() => {
        const btns = document.querySelectorAll("button");
        const original = btns[0].innerHTML;
        btns.forEach(btn => {
          if (btn.textContent.includes("COPY")) {
            btn.innerHTML = `<i class="fas fa-check"></i> COPIED!`;
            setTimeout(() => btn.innerHTML = original, 2000);
          }
        });
      });
    };

    // Load everything when page opens
    window.onload = loadLibraries;
  </script>
</body>
</html>
